<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JBL — Amruta J</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'Bricolage Grotesque Condensed';
    src: url('BricolageGrotesque48ptCondensed-SemiBold.ttf') format('truetype');
    font-weight:600;
    font-style:normal;
    font-display:swap;
  }

  :root{
    /* ---- Colors (design system) ---- */
    --bg: #FAFAFA;
    --surface: #FFFFFF;
    --surface-2: #F1F0EE;
    --heading: #1D1D1D;
    --body-text: #4A4948;
    --text-faint: #8C8B89;
    --coral: #FF5C4D;
    --coral-dim: rgba(255,92,77,0.12);
    --line: rgba(29,29,29,0.09);

    /* ---- Fonts ---- */
    --font-heading: 'Bricolage Grotesque Condensed', 'Bricolage Grotesque', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;

    /* ---- Type scale ---- */
    --h1: 56px;
    --h2: 42px;
    --h3: 30px;
    --h4: 24px;
    --h5: 18px;
    --p1: 22px;
    --p2: 16px;
    --p3: 14px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--body-text);
    font-family:var(--font-body);
    font-size:var(--p2);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--coral); color:#fff;}
  :focus-visible{ outline:2px solid var(--coral); outline-offset:3px; }

  h1,h2,h3,h4,h5{
    font-family:var(--font-heading);
    font-weight:600;
    color:var(--heading);
    letter-spacing:0.01em;
    line-height:1.15;
  }

  img{ display:block; max-width:100%; }

  /* ---------- Top nav ---------- */
  .topnav{
    display:flex; align-items:center; justify-content:space-between;
    padding: 3.5rem 8vw 0;
  }
  .logo-text{
    font-family:var(--font-heading);
    font-size:var(--h3);
    font-weight:600;
    color:var(--coral);
    letter-spacing:0.01em;
  }
  .back-link{
    font-family:var(--font-body); font-size:var(--p2); font-weight:500;
    color:var(--heading);
    transition:color 0.2s ease;
  }
  .back-link:hover{ color:var(--coral); }

  /* ---------- Case study header ---------- */
  .case-header{
    max-width:1280px; margin:0 auto;
    padding: 5rem 8vw 3rem;
  }
  .tag-row{ display:flex; align-items:center; gap:0.8rem; margin-bottom:1.4rem; }
  .tag{
    font-family:var(--font-body); font-size:var(--p3); text-transform:uppercase;
    letter-spacing:0.08em; padding:0.3rem 0.6rem; border-radius:3px;
    border:1px solid var(--coral); color:var(--coral);
  }
  .project-year{ font-family:var(--font-body); color:var(--text-faint); font-size:var(--p3); }
  .case-header h1{ font-size:clamp(2.2rem, 4.6vw, var(--h1)); max-width:20ch; }
  .skill-chips{ display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:1.4rem; }
  .chip{
    font-family:var(--font-body); font-size:var(--p3); color:var(--body-text); background:var(--surface);
    border:1px solid var(--line); padding:0.3rem 0.7rem; border-radius:20px;
  }

  /* ---------- Gallery blocks ---------- */
  main.case-body{
    max-width:1280px; margin:0 auto; padding: 0 8vw 6rem;
    display:flex; flex-direction:column; gap:1.6rem;
  }

  .block{ padding:0; }
  .block.divider-block{ padding:0.4rem 0; }

  .hero-shot{
    width:100%; border-radius:16px; overflow:hidden;
    border:1px solid var(--line);
    background:var(--surface-2);
  }
  .hero-shot img{ width:100%; height:auto; object-fit:cover; }

  .grid-2{
    display:grid; grid-template-columns:1fr 1fr; gap:1.6rem;
  }
  .grid-2 .frame{
    border-radius:16px; overflow:hidden;
    border:1px solid var(--line);
    background:var(--surface-2);
  }
  .grid-2 .frame img{ width:100%; height:100%; object-fit:cover; }

  .grid-3{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:1.6rem;
  }
  .grid-3 .frame{
    border-radius:16px; overflow:hidden;
    border:1px solid var(--line);
    background:var(--surface-2);
  }
  .grid-3 .frame img{ width:100%; height:100%; object-fit:cover; }

  .divider{
    height:1px; width:100%;
    background:var(--line);
  }

  /* ---------- Creative grid: 2 up top, 3 below ---------- */
  .card-frame{
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--surface);
    box-shadow:0 10px 26px rgba(29,29,29,0.08), 0 2px 6px rgba(29,29,29,0.04);
    padding:12px;
    aspect-ratio:1/1;
    transition:transform 0.25s ease, box-shadow 0.25s ease;
  }
  .card-frame img{
    width:100%; height:100%;
    object-fit:contain;
    display:block;
    border-radius:12px;
  }
  .card-frame:hover{
    transform:translateY(-4px);
    box-shadow:0 16px 34px rgba(29,29,29,0.12), 0 4px 10px rgba(29,29,29,0.05);
  }

  @media (max-width: 720px){
    .grid-2{ grid-template-columns:1fr; }
    .grid-3{ grid-template-columns:1fr; }
  }

  /* ---------- Magnetic carousel (JBL M images) ---------- */
  .magnetic-carousel{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    position:relative;
    padding:2.5rem 0;
    min-height:400px;
  }
  .mag-backdrop{
    position:absolute; inset:0; z-index:1;
    display:none; cursor:pointer;
  }
  .magnetic-carousel.open .mag-backdrop{ display:block; }
  .mag-item{
    flex:0 0 auto;
    width:140px;
    height:340px;
    border-radius:16px;
    overflow:hidden;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-color:var(--surface-2);
    border:1px solid var(--line);
    cursor:pointer;
    position:relative;
    z-index:2;
    will-change:width, height;
    transition:none;
  }
  .mag-item.open-transition{
    transition:width 0.35s ease-in-out, height 0.35s ease-in-out, filter 0.35s ease-in-out, opacity 0.35s ease-in-out;
  }
  .mag-item.blurred{ filter:blur(3px); opacity:0.6; }
  .mag-item.active{ z-index:3; }

  @media (max-width: 720px){
    .magnetic-carousel{ gap:10px; min-height:260px; padding:1.5rem 0; }
    .mag-item{ width:78px; height:210px; border-radius:12px; }
  }

  footer{
    margin-top:0; padding: 3.5rem 8vw 3rem;
    display:flex; justify-content:space-between; align-items:flex-end;
    flex-wrap:wrap; gap:2rem;
    border-top:1px solid var(--line);
  }
  footer h2{ font-size:var(--h2); max-width:30ch; }
  footer .contact-links{ display:flex; flex-direction:column; align-items:flex-end; gap:1rem; font-family:var(--font-body); font-size:var(--p3); }
  footer .contact-email{ color:var(--coral); font-size:var(--p2); font-weight:500; }
  footer .contact-email:hover{ opacity:0.8; }
  .foot-note{
    max-width:1280px; margin:0 auto; padding: 0 8vw 3rem;
    font-family:var(--font-body); font-size:var(--p3); color:var(--text-faint);
  }
</style>
</head>
<body>

<div class="topnav">
  <a class="logo-text" href="index.html">Amruta J</a>
  <a class="back-link" href="index.html">← Back to portfolio</a>
</div>

<header class="case-header">
  <div class="tag-row">
    <span class="tag">Visual Design</span>
    <span class="project-year">2019</span>
  </div>
  <h1>JBL</h1>
  <div class="skill-chips">
    <span class="chip">Visual Design</span><span class="chip">Campaign Design</span><span class="chip">Social &amp; Retail</span>
  </div>
</header>

<main class="case-body">

  <div class="block">
    <div class="hero-shot">
      <img src="JBL Front.png" alt="JBL campaign hero visual">
    </div>
  </div>

  <div class="block">
    <div class="grid-2">
      <div class="card-frame"><img src="A1.png" alt="JBL creative A1"></div>
      <div class="card-frame"><img src="A2.png" alt="JBL creative A2"></div>
    </div>
  </div>

  <div class="block">
    <div class="grid-3">
      <div class="card-frame"><img src="A3.png" alt="JBL creative A3"></div>
      <div class="card-frame"><img src="A4.png" alt="JBL creative A4"></div>
      <div class="card-frame"><img src="A6.png" alt="JBL creative A6"></div>
    </div>
  </div>

  <div class="block divider-block"><div class="divider"></div></div>

  <div class="block">
    <div class="magnetic-carousel" id="jblMagCarousel">
      <div class="mag-item" data-src="JBL M 2.png" aria-label="JBL creative M2"></div>
      <div class="mag-item" data-src="JBL M 3.png" aria-label="JBL creative M3"></div>
      <div class="mag-item" data-src="JBL M 1.png" aria-label="JBL creative M1"></div>
      <div class="mag-backdrop"></div>
    </div>
  </div>

  <div class="block divider-block"><div class="divider"></div></div>

  <div class="block">
    <div class="hero-shot">
      <img src="JBL S 4.png" alt="JBL campaign secondary hero visual">
    </div>
  </div>

  <div class="block">
    <div class="grid-3">
      <div class="frame"><img src="JBL S 1.png" alt="JBL creative S1"></div>
      <div class="frame"><img src="JBL S 3.png" alt="JBL creative S3"></div>
      <div class="frame"><img src="JBL S 2.png" alt="JBL creative S2"></div>
    </div>
  </div>

</main>

<footer id="contact">
  <h2>From concept to creation,<br>let's make it happen</h2>
  <div class="contact-links">
    <a class="contact-email" href="mailto:amruta.inbox@gmail.com">amruta.inbox@gmail.com</a>
  </div>
</footer>
<div class="foot-note">© 2026 Amruta J — Brisbane, Australia</div>

<script>
(function(){
  const container = document.getElementById('jblMagCarousel');
  if(!container) return;

  const items = Array.from(container.querySelectorAll('.mag-item'));
  const backdrop = container.querySelector('.mag-backdrop');
  const n = items.length;

  const isMobile = () => window.matchMedia('(max-width: 720px)').matches;
  const dims = () => isMobile()
    ? { collapsedW: 78,  hoverW: 130, collapsedH: 210, hoverH: 250, openSize: 300, gap: 10, influence: 110 }
    : { collapsedW: 140, hoverW: 260, collapsedH: 340, hoverH: 400, openSize: 560, gap: 16, influence: 220 };

  let target = items.map(() => 0);
  let cur = items.map(() => 0);
  let openIndex = null;
  let rafId = null;

  items.forEach((el) => {
    el.style.backgroundImage = `url('${el.getAttribute('data-src')}')`;
  });

  function sizeFor(i){
    const { collapsedW, hoverW, collapsedH, hoverH, openSize } = dims();
    if (openIndex !== null){
      return i === openIndex
        ? { w: openSize, h: openSize }
        : { w: collapsedW, h: collapsedH };
    }
    const f = cur[i] || 0;
    return {
      w: collapsedW + (hoverW - collapsedW) * f,
      h: collapsedH + (hoverH - collapsedH) * f,
    };
  }

  function render(){
    items.forEach((el, i) => {
      const { w, h } = sizeFor(i);
      el.style.width = w + 'px';
      el.style.height = h + 'px';
    });
  }

  function loop(){
    let moving = false;
    for (let i = 0; i < n; i++){
      const d = (target[i] || 0) - cur[i];
      if (Math.abs(d) > 0.001){ cur[i] += d * 0.2; moving = true; }
      else { cur[i] = target[i] || 0; }
    }
    render();
    rafId = moving ? requestAnimationFrame(loop) : null;
  }

  function startLoop(){
    if (!rafId) rafId = requestAnimationFrame(loop);
  }

  function setTargetFromCursor(clientX){
    const { collapsedW, gap, influence } = dims();
    const rect = container.getBoundingClientRect();
    const cx = clientX - rect.left;
    const totalBase = n * collapsedW + (n - 1) * gap;
    const startX = (rect.width - totalBase) / 2;
    target = items.map((_, i) => {
      const center = startX + i * (collapsedW + gap) + collapsedW / 2;
      const dist = Math.abs(cx - center);
      const f = Math.max(0, 1 - dist / influence);
      return f * f * (3 - 2 * f);
    });
    startLoop();
  }

  container.addEventListener('mousemove', (e) => {
    if (openIndex !== null) return;
    setTargetFromCursor(e.clientX);
  });
  container.addEventListener('mouseleave', () => {
    if (openIndex !== null) return;
    target = items.map(() => 0);
    startLoop();
  });

  function withTransition(fn){
    items.forEach((el) => el.classList.add('open-transition'));
    fn();
    setTimeout(() => {
      items.forEach((el) => el.classList.remove('open-transition'));
    }, 380);
  }

  function open(i){
    openIndex = i;
    container.classList.add('open');
    withTransition(() => {
      items.forEach((el, j) => {
        el.classList.toggle('blurred', j !== i);
        el.classList.toggle('active', j === i);
      });
      render();
    });
  }

  function close(){
    target = items.map(() => 0);
    cur = items.map(() => 0);
    openIndex = null;
    container.classList.remove('open');
    withTransition(() => {
      items.forEach((el) => {
        el.classList.remove('blurred', 'active');
      });
      render();
    });
  }

  items.forEach((el, i) => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (openIndex === i) close();
      else open(i);
    });
  });
  backdrop.addEventListener('click', close);

  window.addEventListener('resize', render);

  render();
})();
</script>
</body>
</html>
