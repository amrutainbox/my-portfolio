<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch Planner — hand-drawn task scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/2.1.1/rough.umd.js"></script>
<style>
  :root{
    --paper:#FFFFFF;
    --paper-2:#F4F3F1;
    --ink:#2B2620;
    --ink-soft:#7a6f5f;
    --line:rgba(60,48,32,0.16);
    --coral:#FF6B4A;
    --teal:#2E9E93;
    --yellow:#F0AF2E;
    --purple:#8D7BC7;
    --blue:#4C86D6;
    --pink:#E17FA0;
    --radius:16px;
    --shadow:0 10px 26px -14px rgba(43,38,32,0.35);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:'Space Grotesk', sans-serif;
    background:
      radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 1px) 0 0/26px 26px,
      var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding:2.6rem 1.4rem 4rem;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:920px; margin:0 auto; }

  /* ---------- Header ---------- */
  header{ text-align:center; margin-bottom:2.2rem; }
  h1{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:clamp(2.6rem, 6vw, 3.6rem);
    margin:0 0 0.2rem;
    color:var(--ink);
    position:relative;
    display:inline-block;
  }
  h1 svg{ position:absolute; left:0; bottom:-10px; width:100%; height:14px; }
  header p{
    color:var(--ink-soft);
    font-size:1.15rem;
    margin:0.6rem 0 0;
  }

  /* ---------- Card ---------- */
  .card{
    background:var(--paper);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:1.6rem 1.6rem 1.8rem;
    margin-bottom:1.6rem;
    position:relative;
  }
  .card svg.border{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  textarea{
    width:100%;
    min-height:92px;
    resize:vertical;
    border:none;
    background:transparent;
    font-family:'Space Grotesk', sans-serif;
    font-size:1.15rem;
    color:var(--ink);
    line-height:1.5;
    outline:none;
    position:relative;
    z-index:1;
  }
  textarea::placeholder{ color:var(--ink-soft); opacity:0.75; }

  .input-row{ display:flex; align-items:flex-start; gap:0.9rem; position:relative; z-index:1; }
  .mic-col{ display:flex; flex-direction:column; align-items:center; gap:0.35rem; flex-shrink:0; }
  .mic-btn{
    position:relative;
    width:52px; height:52px;
    border-radius:50%;
    border:2px solid var(--ink);
    background:var(--paper-2);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:transform 0.15s ease, background 0.2s ease;
  }
  .mic-btn:hover{ transform:scale(1.06) rotate(-4deg); }
  .mic-btn.listening{
    background:var(--coral);
    animation:pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,107,74,0.45); }
    50%{ box-shadow:0 0 0 10px rgba(255,107,74,0); }
  }
  .mic-btn svg:first-child{ width:22px; height:22px; transition:opacity 0.15s ease; }
  .mic-btn.listening svg:first-child{ opacity:0; }

  /* waveform shown instead of the mic icon while actively listening */
  .mic-wave{
    position:absolute; inset:0;
    display:none; align-items:center; justify-content:center; gap:3px;
  }
  .mic-btn.listening .mic-wave{ display:flex; }
  .mic-wave i{
    display:block; width:3px; height:8px; border-radius:2px;
    background:var(--paper);
    animation:wave 0.9s ease-in-out infinite;
  }
  .mic-wave i:nth-child(1){ animation-delay:0s; }
  .mic-wave i:nth-child(2){ animation-delay:0.15s; }
  .mic-wave i:nth-child(3){ animation-delay:0.3s; }
  .mic-wave i:nth-child(4){ animation-delay:0.45s; }
  @keyframes wave{
    0%,100%{ height:7px; }
    50%{ height:20px; }
  }

  .mic-label{
    font-size:0.85rem; color:var(--coral); font-weight:400;
    opacity:0; transition:opacity 0.2s ease;
    white-space:nowrap;
  }
  .mic-label.show{ opacity:1; }
  .mic-label::after{
    content:'';
    display:inline-block; width:5px; height:5px; border-radius:50%;
    background:var(--coral); margin-left:3px;
    animation:blink 1s steps(1) infinite;
    vertical-align:middle;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .live-caption{
    max-height:0; overflow:hidden; opacity:0;
    transition:max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
    font-size:1.02rem; color:var(--ink-soft); font-style:italic;
    position:relative; z-index:1; padding-left:0.1rem;
  }
  .live-caption.show{ max-height:60px; opacity:1; margin-top:0.4rem; }

  .controls-row{
    display:flex; flex-wrap:wrap; align-items:center; gap:1rem 1.4rem;
    margin-top:1.3rem; position:relative; z-index:1;
  }
  .field{ display:flex; align-items:center; gap:0.5rem; }
  .field label{ font-size:1.05rem; color:var(--ink-soft); }
  .field input[type="date"]{
    font-family:'Space Grotesk', sans-serif;
    font-size:1.05rem;
    color:var(--ink);
    background:var(--paper-2);
    border:2px solid var(--ink);
    border-radius:10px;
    padding:0.35rem 0.6rem;
    outline:none;
  }
  .toggle{
    display:flex;
    border:2px solid var(--ink);
    border-radius:999px;
    overflow:hidden;
    position:relative;
  }
  .toggle button{
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    font-size:1.02rem;
    padding:0.4rem 1.1rem;
    background:transparent;
    border:none;
    cursor:pointer;
    color:var(--ink);
    position:relative; z-index:1;
    transition:color 0.25s ease;
  }
  .toggle button.active{ color:var(--paper); }
  .toggle-pill{
    position:absolute; top:2px; bottom:2px; left:2px;
    width:calc(50% - 2px);
    background:var(--ink);
    border-radius:999px;
    transition:transform 0.28s cubic-bezier(.65,0,.35,1);
    z-index:0;
  }
  .toggle button:nth-child(2).active ~ .toggle-pill,
  .toggle.month .toggle-pill{ transform:translateX(100%); }

  .gen-btn{
    margin-left:auto;
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:1.05rem;
    color:var(--paper);
    background:var(--ink);
    border:none;
    border-radius:999px;
    padding:0.65rem 1.5rem;
    cursor:pointer;
    display:flex; align-items:center; gap:0.5rem;
    transition:transform 0.15s ease, background 0.2s ease;
  }
  .gen-btn:hover{ transform:translateY(-2px) rotate(-1deg); background:var(--coral); }
  .gen-btn:active{ transform:translateY(0) rotate(0); }
  .gen-btn:disabled{ opacity:0.55; cursor:default; transform:none; }
  .gen-btn svg{ width:18px; height:18px; }

  /* ---------- Legend ---------- */
  .legend{ display:flex; flex-wrap:wrap; gap:0.8rem 1.3rem; margin:0.2rem 0 1.4rem; padding:0 0.2rem; }
  .legend span{ display:flex; align-items:center; gap:0.4rem; font-size:0.98rem; color:var(--ink-soft); }
  .legend i{ width:13px; height:13px; border-radius:3px; display:inline-block; }

  /* ---------- Chart card ---------- */
  .chart-card{ overflow-x:auto; min-height:120px; position:relative; }
  .chart-card svg.border{ z-index:0; }
  #chartHost{ position:relative; z-index:1; }
  #chartHost svg{ display:block; }

  .empty-state, .loading-state{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:2.2rem 1rem; color:var(--ink-soft); gap:0.6rem;
  }
  .empty-state svg, .loading-state svg{ width:64px; height:64px; }
  .loading-state .pencil{ animation:scribble 1.1s ease-in-out infinite; transform-origin:20% 80%; }
  @keyframes scribble{
    0%,100%{ transform:rotate(-8deg); }
    50%{ transform:rotate(8deg); }
  }

  .bar-group{ opacity:0; transform:scale(0.85); transform-origin:left center; animation:barIn 0.45s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes barIn{ to{ opacity:1; transform:scale(1); } }

  .tooltip{
    position:absolute;
    background:#FFF7DE;
    border:2px solid var(--ink);
    border-radius:8px;
    padding:0.5rem 0.7rem;
    font-size:0.95rem;
    line-height:1.35;
    box-shadow:3px 4px 0 rgba(43,38,32,0.18);
    pointer-events:none;
    transform:rotate(-1.5deg);
    z-index:5;
    opacity:0;
    transition:opacity 0.15s ease;
    max-width:200px;
  }
  .tooltip.show{ opacity:1; }
  .tooltip b{ display:block; margin-bottom:2px; }

  .scribble-burst{ position:fixed; pointer-events:none; z-index:999; }


  @media (max-width:600px){
    .controls-row{ flex-direction:column; align-items:stretch; }
    .gen-btn{ margin-left:0; justify-content:center; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Sketch your plan
      <svg viewBox="0 0 300 14" preserveAspectRatio="none"><path d="M2 8 C 60 2, 120 12, 160 6 S 260 2, 298 8" stroke="var(--coral)" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
    </h1>
    <p>Tell it what's on your plate — typing or talking — and watch it turn into a hand-drawn schedule.</p>
  </header>

  <div class="card" id="inputCard">
    <svg class="border" id="inputBorder"></svg>
    <div class="input-row">
      <textarea id="taskInput" placeholder="e.g. finish the homepage design, write a blog post twice this week, call the client Thursday, prep slides before Friday's demo..."></textarea>
      <div class="mic-col">
        <button class="mic-btn" id="micBtn" title="Speak your tasks" aria-label="Speak your tasks">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="mic-wave" aria-hidden="true">
            <i></i><i></i><i></i><i></i>
          </span>
        </button>
        <span class="mic-label" id="micLabel">Listening…</span>
      </div>
    </div>
    <div class="live-caption" id="liveCaption"></div>

    <div class="controls-row">
      <div class="field">
        <label for="startDate">Starting</label>
        <input type="date" id="startDate">
      </div>
      <div class="toggle" id="viewToggle">
        <button type="button" class="active" data-view="week">Week</button>
        <button type="button" data-view="month">Month</button>
        <div class="toggle-pill"></div>
      </div>
      <button class="gen-btn" id="genBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 20l1.2-4.2L16.5 4.5a1.7 1.7 0 0 1 2.4 0l0.6.6a1.7 1.7 0 0 1 0 2.4L8.2 18.8 4 20Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        <span id="genBtnLabel">Sketch my week</span>
      </button>
    </div>
  </div>

  <div class="legend">
    <span><i style="background:var(--coral)"></i> Design</span>
    <span><i style="background:var(--blue)"></i> Build</span>
    <span><i style="background:var(--purple)"></i> Meetings</span>
    <span><i style="background:var(--yellow)"></i> Writing</span>
    <span><i style="background:var(--pink)"></i> Admin</span>
  </div>

  <div id="statusMsg" style="display:none; text-align:center; font-size:0.95rem; color:var(--ink-soft); margin:-0.6rem 0 1rem;"></div>

  <div class="card chart-card" id="chartCard">
    <svg class="border" id="chartBorder"></svg>
    <div id="chartHost">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 64 64" fill="none"><rect x="10" y="8" width="44" height="50" rx="4" stroke="#B8A98C" stroke-width="2.2"/><path d="M18 20h28M18 30h28M18 40h18" stroke="#D8CDB6" stroke-width="2.2" stroke-linecap="round"/><rect x="30" y="46" width="1.6" height="10" fill="#FF6B4A"><animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></rect></svg>
        <div>Your sketchbook's empty — jot a few tasks above and hit sketch.</div>
      </div>
    </div>
  </div>

</div>

<script>
/* ================= Rough.js hand-drawn helpers (with safe fallback) ================= */
function makeShimRough(){
  // Minimal plain-SVG stand-in used only if rough.js fails to load,
  // so the chart still renders (just without the hand-drawn wobble).
  const NS = 'http://www.w3.org/2000/svg';
  return {
    svg(){
      return {
        rectangle(x,y,w,h,opts={}){
          const r = document.createElementNS(NS,'rect');
          r.setAttribute('x',x); r.setAttribute('y',y);
          r.setAttribute('width',w); r.setAttribute('height',h);
          r.setAttribute('rx',6);
          r.setAttribute('fill', opts.fill || 'none');
          r.setAttribute('stroke', opts.stroke || '#2B2620');
          r.setAttribute('stroke-width', opts.strokeWidth || 1.6);
          return r;
        },
        line(x1,y1,x2,y2,opts={}){
          const l = document.createElementNS(NS,'line');
          l.setAttribute('x1',x1); l.setAttribute('y1',y1);
          l.setAttribute('x2',x2); l.setAttribute('y2',y2);
          l.setAttribute('stroke', opts.stroke || '#2B2620');
          l.setAttribute('stroke-width', opts.strokeWidth || 1);
          if(opts.strokeLineDash) l.setAttribute('stroke-dasharray', opts.strokeLineDash.join(','));
          return l;
        }
      };
    }
  };
}
const rough = window.rough || makeShimRough();
const usingShim = !window.rough;

function drawBorder(svgEl, color, roughness=1.6){
  svgEl.innerHTML = '';
  const rect = svgEl.getBoundingClientRect();
  svgEl.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
  const rc = rough.svg(svgEl);
  const node = rc.rectangle(3, 3, rect.width-6, rect.height-6, {
    stroke: color, strokeWidth: 2, roughness, fill:'none'
  });
  svgEl.appendChild(node);
}

function redrawBorders(){
  drawBorder(document.getElementById('inputBorder'), '#2B2620');
  drawBorder(document.getElementById('chartBorder'), '#2B2620');
}
window.addEventListener('resize', redrawBorders);

/* ================= View toggle ================= */
const toggleEl = document.getElementById('viewToggle');
const genLabel = document.getElementById('genBtnLabel');
let currentView = 'week';
toggleEl.querySelectorAll('button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    toggleEl.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    toggleEl.classList.toggle('month', currentView === 'month');
    genLabel.textContent = currentView === 'week' ? 'Sketch my week' : 'Sketch my month';
  });
});

/* ================= Date default ================= */
const startDateInput = document.getElementById('startDate');
const todayStr = new Date().toISOString().slice(0,10);
startDateInput.value = todayStr;

/* ================= Voice input ================= */
const micBtn = document.getElementById('micBtn');
const micLabel = document.getElementById('micLabel');
const liveCaption = document.getElementById('liveCaption');
const taskInput = document.getElementById('taskInput');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const isSecureCtx = window.isSecureContext || location.protocol === 'https:' || location.hostname === 'localhost';
let recognizing = false;

function micUnavailable(reason){
  micBtn.title = reason;
  micBtn.style.opacity = '0.4';
  micBtn.style.cursor = 'not-allowed';
  micBtn.addEventListener('click', (e)=>{
    e.preventDefault();
    setStatus(reason);
  });
}

function setListeningUI(on){
  micBtn.classList.toggle('listening', on);
  micLabel.classList.toggle('show', on);
  if(!on){
    liveCaption.classList.remove('show');
    liveCaption.textContent = '';
  }
}

if(!SpeechRecognition){
  micUnavailable('Voice input isn\u2019t supported in this browser — try Chrome or Edge, or just type instead.');
}else if(!isSecureCtx){
  // Speech Recognition requires a secure context (https:// or localhost).
  // Opening the file directly (file://) or over plain http:// will silently fail otherwise.
  micUnavailable('Voice input needs this page to be served over https:// (or localhost) — it won\u2019t work opened directly from a file. Type your tasks instead.');
}else{
  const recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onstart = ()=>{ recognizing = true; setListeningUI(true); setStatus(''); };
  recognition.onend = ()=>{ recognizing = false; setListeningUI(false); };
  recognition.onerror = (e)=>{
    recognizing = false;
    setListeningUI(false);
    const messages = {
      'not-allowed': 'Microphone access was blocked — allow it in your browser\u2019s site settings and try again.',
      'audio-capture': 'No microphone found — check that one is connected and try again.',
      'no-speech': 'Didn\u2019t catch that — try speaking again after tapping the mic.',
      'network': 'Voice recognition needs an internet connection.',
      'aborted': ''
    };
    const msg = messages[e.error] ?? `Voice input error: ${e.error}`;
    if(msg) setStatus(msg);
  };
  recognition.onresult = (e)=>{
    let interim = '', final = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const chunk = e.results[i][0].transcript;
      if(e.results[i].isFinal) final += chunk;
      else interim += chunk;
    }
    if(interim){
      liveCaption.textContent = interim;
      liveCaption.classList.add('show');
    }
    if(final){
      taskInput.value = taskInput.value ? (taskInput.value.trim() + '. ' + final.trim()) : final.trim();
      liveCaption.textContent = '';
      liveCaption.classList.remove('show');
    }
  };
  micBtn.addEventListener('click', ()=>{
    if(recognizing){ recognition.stop(); return; }
    try{
      recognition.start();
    }catch(err){
      setStatus('Couldn\u2019t start voice input: ' + err.message);
    }
  });
}

/* ================= AI task parsing (with local fallback) ================= */
const CATS = ['design','dev','meeting','writing','admin'];
const CAT_COLORS = { design:'#FF6B4A', dev:'#4C86D6', meeting:'#8D7BC7', writing:'#F0AF2E', admin:'#E17FA0' };
const CAT_KEYWORDS = {
  design:['design','mockup','wireframe','figma','prototype','ui','ux','logo','brand'],
  dev:['build','code','dev','implement','bug','fix','deploy','api','feature'],
  meeting:['call','meeting','sync','standup','demo','presentation','client','interview'],
  writing:['write','blog','post','copy','draft','doc','article','newsletter'],
  admin:['email','invoice','admin','organize','plan','review','clean','schedule']
};

function guessCategory(text){
  const lower = text.toLowerCase();
  for(const cat of CATS){
    if(CAT_KEYWORDS[cat].some(k=>lower.includes(k))) return cat;
  }
  return CATS[Math.floor(Math.random()*CATS.length)];
}

// Simple local fallback parser — used if the AI call is unavailable
// (e.g. when this file is hosted outside the Claude preview sandbox).
function fallbackParse(raw, rangeDays){
  const chunks = raw.split(/,|\n|;|\band\b/i).map(s=>s.trim()).filter(Boolean);
  if(chunks.length === 0) return [];
  const weekdayMap = { sunday:0, monday:1, tuesday:2, wednesday:3, thursday:4, friday:5, saturday:6 };
  const startWeekday = new Date(startDateInput.value + 'T00:00:00').getDay();
  return chunks.slice(0, 10).map((chunk, i)=>{
    let day = Math.floor((i / chunks.length) * Math.max(1, rangeDays - 2));
    const lower = chunk.toLowerCase();
    for(const [name, idx] of Object.entries(weekdayMap)){
      if(lower.includes(name)){
        let diff = idx - startWeekday;
        if(diff < 0) diff += 7;
        day = Math.min(diff, rangeDays-1);
      }
    }
    let duration = 1;
    if(/\bweek\b/.test(lower)) duration = Math.min(5, rangeDays - day);
    if(/twice|two days|couple of days/.test(lower)) duration = 2;
    const name = chunk.length > 34 ? chunk.slice(0,32).trim()+'…' : chunk.charAt(0).toUpperCase()+chunk.slice(1);
    return { name, day: Math.max(0, Math.min(day, rangeDays-1)), duration: Math.max(1, duration), category: guessCategory(chunk) };
  });
}

async function parseTasksWithAI(raw, rangeDays, startDate){
  const weekday = startDate.toLocaleDateString('en-US', { weekday:'long' });
  const sys = `You turn a messy, possibly rambling list of tasks into a schedule. The schedule window starts on ${weekday}, ${startDate.toDateString()} and spans exactly ${rangeDays} days (day 0 = start date, day ${rangeDays-1} = last day). Respond with ONLY a raw JSON array (no markdown fences, no prose, no explanation). Each item: {"name": short task label under 30 characters, "day": integer 0 to ${rangeDays-1}, "duration": integer 1 to ${Math.min(6,rangeDays)}, "category": one of "design","dev","meeting","writing","admin"}. Infer realistic placement from any day names, deadlines, or urgency words mentioned. Spread tasks sensibly across the window. Return at most ${rangeDays <= 7 ? 8 : 14} items.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: sys,
      messages: [{ role: "user", content: raw }]
    })
  });
  if(!response.ok) throw new Error('API error');
  const data = await response.json();
  const text = (data.content || []).map(b=>b.text||'').join('').trim();
  const clean = text.replace(/```json|```/g,'').trim();
  const parsed = JSON.parse(clean);
  return parsed.map(t=>({
    name: String(t.name||'Task').slice(0,34),
    day: Math.max(0, Math.min(Number(t.day)||0, rangeDays-1)),
    duration: Math.max(1, Math.min(Number(t.duration)||1, rangeDays)),
    category: CATS.includes(t.category) ? t.category : guessCategory(t.name||'')
  }));
}

/* ================= Chart rendering ================= */
const chartHost = document.getElementById('chartHost');
let activeTooltip = null;

function daysInMonth(y, m){ return new Date(y, m+1, 0).getDate(); }

function buildDateLabels(startDate, rangeDays){
  const labels = [];
  for(let i=0;i<rangeDays;i++){
    const d = new Date(startDate);
    d.setDate(d.getDate()+i);
    labels.push(d);
  }
  return labels;
}

function renderGantt(tasks, startDate, rangeDays){
  chartHost.innerHTML = '';
  if(tasks.length === 0){
    chartHost.innerHTML = document.getElementById('emptyState').outerHTML;
    return;
  }
  const colW = rangeDays <= 7 ? 96 : 30;
  const rowH = 46;
  const headerH = 46;
  const leftPad = 8;
  const width = leftPad*2 + colW*rangeDays;
  const height = headerH + tasks.length*rowH + 16;

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.style.minWidth = width+'px';
  svg.style.fontFamily = "'Space Grotesk', sans-serif";
  chartHost.appendChild(svg);

  const rc = rough.svg(svg);
  const labels = buildDateLabels(startDate, rangeDays);
  const todayKey = new Date().toDateString();

  // day columns / header
  labels.forEach((d, i)=>{
    const x = leftPad + i*colW;
    const isWeekend = d.getDay()===0 || d.getDay()===6;
    const isToday = d.toDateString() === todayKey;

    if(isWeekend){
      const shade = document.createElementNS('http://www.w3.org/2000/svg','rect');
      shade.setAttribute('x', x); shade.setAttribute('y', headerH);
      shade.setAttribute('width', colW); shade.setAttribute('height', height-headerH);
      shade.setAttribute('fill', '#00000006');
      svg.appendChild(shade);
    }
    // gridline
    const line = rc.line(x, headerH-4, x, height-6, { stroke:'#2B262022', strokeWidth:1, roughness:1.2 });
    svg.appendChild(line);

    // header label
    const t1 = document.createElementNS('http://www.w3.org/2000/svg','text');
    t1.setAttribute('x', x + colW/2); t1.setAttribute('y', 18);
    t1.setAttribute('text-anchor','middle'); t1.setAttribute('font-size', rangeDays<=7?'14':'11');
    t1.setAttribute('fill', isToday ? '#FF6B4A' : '#2B2620');
    t1.textContent = d.toLocaleDateString('en-US',{ weekday: rangeDays<=7 ? 'short' : 'narrow' });
    svg.appendChild(t1);

    const t2 = document.createElementNS('http://www.w3.org/2000/svg','text');
    t2.setAttribute('x', x + colW/2); t2.setAttribute('y', 36);
    t2.setAttribute('text-anchor','middle'); t2.setAttribute('font-size', rangeDays<=7?'13':'10');
    t2.setAttribute('fill', '#7a6f5f');
    t2.textContent = d.getDate();
    svg.appendChild(t2);
  });
  const closeLine = rc.line(leftPad+rangeDays*colW, headerH-4, leftPad+rangeDays*colW, height-6, { stroke:'#2B262022', strokeWidth:1, roughness:1.2 });
  svg.appendChild(closeLine);

  // header underline
  svg.appendChild(rc.line(leftPad-4, headerH, width-leftPad+4, headerH, { stroke:'#2B2620', strokeWidth:1.6, roughness:1.4 }));

  // today marker
  const todayIdx = labels.findIndex(d=>d.toDateString()===todayKey);
  if(todayIdx >= 0){
    const tx = leftPad + todayIdx*colW + colW/2;
    svg.appendChild(rc.line(tx, headerH, tx, height-6, { stroke:'#FF6B4A', strokeWidth:1.6, roughness:2, strokeLineDash:[5,4] }));
  }

  // task bars
  tasks.forEach((task, i)=>{
    const y = headerH + i*rowH + 8;
    const x = leftPad + task.day*colW + 3;
    const w = Math.max(colW*task.duration - 6, 14);
    const color = CAT_COLORS[task.category] || '#999';

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','bar-group');
    g.style.animationDelay = (i*0.09)+'s';

    const bar = rc.rectangle(x, y, w, rowH-16, {
      fill: color, fillStyle:'hachure', hachureGap: 4.5, fillWeight: 2.2,
      stroke: '#2B2620', strokeWidth: 1.6, roughness: 1.9
    });
    g.appendChild(bar);

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    const showInside = w > 70;
    label.setAttribute('x', showInside ? x+8 : x + w + 8);
    label.setAttribute('y', y + (rowH-16)/2 + 5);
    label.setAttribute('font-size','13');
    label.setAttribute('fill', showInside ? '#2B2620' : '#2B2620');
    label.textContent = task.name;
    g.appendChild(label);

    g.style.cursor = 'pointer';
    g.addEventListener('mouseenter', (e)=>showTooltip(e, task, labels));
    g.addEventListener('mousemove', (e)=>moveTooltip(e));
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('touchstart', (e)=>showTooltip(e.touches[0], task, labels), {passive:true});

    svg.appendChild(g);
  });

  burstScribbles();
}

function showTooltip(e, task, labels){
  hideTooltip();
  const tip = document.createElement('div');
  tip.className = 'tooltip';
  const startD = labels[task.day];
  const endD = labels[Math.min(task.day+task.duration-1, labels.length-1)];
  tip.innerHTML = `<b>${task.name}</b>${startD.toLocaleDateString('en-US',{month:'short',day:'numeric'})}${task.duration>1 ? ' → '+endD.toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''} · ${task.category}`;
  document.body.appendChild(tip);
  activeTooltip = tip;
  moveTooltip(e);
  requestAnimationFrame(()=>tip.classList.add('show'));
}
function moveTooltip(e){
  if(!activeTooltip) return;
  const cx = e.clientX ?? (e.pageX||0);
  const cy = e.clientY ?? (e.pageY||0);
  activeTooltip.style.left = (cx+14)+'px';
  activeTooltip.style.top = (cy+14+window.scrollY)+'px';
}
function hideTooltip(){
  if(activeTooltip){ activeTooltip.remove(); activeTooltip = null; }
}

/* playful little scribble confetti burst near the generate button */
function burstScribbles(){
  const btn = document.getElementById('genBtn');
  const rect = btn.getBoundingClientRect();
  const colors = ['#FF6B4A','#4C86D6','#8D7BC7','#F0AF2E','#E17FA0'];
  for(let i=0;i<7;i++){
    const s = document.createElement('div');
    s.className = 'scribble-burst';
    s.style.left = (rect.left + rect.width/2) + 'px';
    s.style.top = (rect.top + rect.height/2) + 'px';
    s.style.width = '5px'; s.style.height = '5px';
    s.style.background = colors[i % colors.length];
    s.style.borderRadius = '50%';
    document.body.appendChild(s);
    const angle = Math.random()*Math.PI*2;
    const dist = 40 + Math.random()*50;
    s.animate([
      { transform:'translate(0,0) scale(1)', opacity:1 },
      { transform:`translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity:0 }
    ], { duration: 550 + Math.random()*250, easing:'cubic-bezier(.2,.8,.3,1)' }).onfinish = ()=>s.remove();
  }
}

/* ================= Generate flow ================= */
const genBtn = document.getElementById('genBtn');
const statusMsg = document.getElementById('statusMsg');

function setStatus(text){
  if(!text){ statusMsg.style.display = 'none'; return; }
  statusMsg.textContent = text;
  statusMsg.style.display = 'block';
}

function showLoading(){
  chartHost.innerHTML = `
    <div class="loading-state">
      <svg class="pencil" viewBox="0 0 24 24" fill="none"><path d="M4 20l1.2-4.2L16.5 4.5a1.7 1.7 0 0 1 2.4 0l0.6.6a1.7 1.7 0 0 1 0 2.4L8.2 18.8 4 20Z" stroke="#2B2620" stroke-width="1.6" stroke-linejoin="round"/></svg>
      <div>Sketching your plan…</div>
    </div>`;
}

genBtn.addEventListener('click', async ()=>{
  const raw = taskInput.value.trim();
  setStatus('');
  if(!raw){
    taskInput.focus();
    taskInput.style.animation = 'none';
    requestAnimationFrame(()=>{ taskInput.style.animation = 'shake 0.4s'; });
    return;
  }
  const startDate = new Date(startDateInput.value + 'T00:00:00');
  let rangeDays;
  if(currentView === 'week'){
    rangeDays = 7;
  }else{
    rangeDays = daysInMonth(startDate.getFullYear(), startDate.getMonth());
    startDate.setDate(1); // month view always sketches the whole month
  }

  genBtn.disabled = true;
  showLoading();

  let tasks;
  let usedFallback = false;
  try{
    tasks = await parseTasksWithAI(raw, rangeDays, startDate);
    if(!tasks || tasks.length === 0) throw new Error('empty');
  }catch(err){
    console.warn('AI parsing unavailable, using local fallback parser:', err);
    tasks = fallbackParse(raw, rangeDays);
    usedFallback = true;
  }

  try{
    renderGantt(tasks, startDate, rangeDays);
  }catch(renderErr){
    console.error('Chart render failed:', renderErr);
    chartHost.innerHTML = `<div class="empty-state">Something went wrong drawing the chart — check the browser console for details.</div>`;
  }

  if(usedFallback){
    setStatus('Using offline sketch mode (AI service unreachable from this page) — tasks placed with a simple keyword/date guess instead.');
  }else if(usingShim){
    setStatus('Drawing library didn\u2019t load, showing a plain-line version of the chart.');
  }
  genBtn.disabled = false;
});

/* shake keyframes injected once */
const styleTag = document.createElement('style');
styleTag.textContent = `@keyframes shake{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(4px);} }`;
document.head.appendChild(styleTag);

/* ================= Init ================= */
window.addEventListener('load', redrawBorders);
setTimeout(redrawBorders, 50);
</script>
